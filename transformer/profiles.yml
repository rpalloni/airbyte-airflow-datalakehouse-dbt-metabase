transformer:
  target: dev
  outputs:
    dev:
      type: dremio
      dremio_space: "{{env_var('DREMIO_SPACE')}}"
      dremio_space_folder: "{{env_var('DREMIO_SPACE_FOLDER')}}"
      object_storage_source: "{{env_var('OBJECT_STORAGE_SOURCE')}}"
      object_storage_path: "{{env_var('OBJECT_STORAGE_PATH')}}"
      user: "{{env_var('DREMIO_USER')}}"
      password: "{{env_var('DREMIO_PASSWORD')}}"
      software_host: 127.0.0.1
      port: 9047
      threads: 1
      use_ssl: false
    cicd:
      type: dremio
      dremio_space: "{{env_var('CI_DREMIO_SPACE')}}"
      dremio_space_folder: "{{env_var('CI_DREMIO_SPACE_FOLDER')}}"
      object_storage_source: "{{env_var('CI_OBJECT_STORAGE_SOURCE')}}"
      object_storage_path: "{{env_var('CI_OBJECT_STORAGE_PATH')}}"
      user: "{{env_var('CI_DREMIO_USER')}}"
      password: "{{env_var('CI_DREMIO_PASSWORD')}}"
      software_host: 127.0.0.1
      port: 9047
      threads: 1
      use_ssl: false